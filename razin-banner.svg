<svg width="100%" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#0f0f1a"/>
    </linearGradient>

    <!-- Accent gradient for name -->
    <linearGradient id="nameGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="50%" style="stop-color:#00f5a0"/>
      <stop offset="100%" style="stop-color:#7b2fff"/>
    </linearGradient>

    <!-- Green glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Particle glow -->
    <filter id="pglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <style>
      /* Base */
      text { font-family: 'Courier New', monospace; }

      /* Scanline animation */
      @keyframes scan {
        0%   { transform: translateY(0px); opacity: 0.6; }
        100% { transform: translateY(400px); opacity: 0; }
      }

      /* Fade in animations */
      @keyframes fadeInUp {
        0%   { opacity: 0; transform: translateY(16px); }
        100% { opacity: 1; transform: translateY(0); }
      }
      @keyframes fadeIn {
        0%   { opacity: 0; }
        100% { opacity: 1; }
      }

      /* Typewriter cursor */
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }

      /* Badge pulse */
      @keyframes pulse {
        0%, 100% { opacity: 0.85; }
        50%       { opacity: 1; }
      }

      /* Particle float */
      @keyframes float1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(6px,-10px)} }
      @keyframes float2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-8px,8px)} }
      @keyframes float3 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(10px,6px)} }
      @keyframes float4 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-5px,-12px)} }
      @keyframes float5 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(8px,10px)} }
      @keyframes float6 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-10px,5px)} }
      @keyframes float7 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(5px,-8px)} }
      @keyframes float8 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-7px,9px)} }

      /* Typewriter text reveal */
      @keyframes type1 {
        0%,15%  { width: 0; }
        35%,60% { width: 220px; }
        75%,100%{ width: 0; }
      }
      @keyframes type2 {
        0%,60%   { width: 0; opacity: 0; }
        61%      { opacity: 1; }
        80%,95%  { width: 240px; }
        99%,100% { width: 0; opacity: 0; }
      }

      /* Corner animations */
      @keyframes cornerIn {
        0%   { opacity: 0; stroke-dashoffset: 80; }
        100% { opacity: 0.5; stroke-dashoffset: 0; }
      }

      /* Tech pill slide in */
      @keyframes slideIn {
        0%   { opacity: 0; transform: translateX(-12px); }
        100% { opacity: 1; transform: translateX(0); }
      }

      /* Stat count bar */
      @keyframes barGrow {
        0%   { transform: scaleX(0); }
        100% { transform: scaleX(1); }
      }

      /* Line draw */
      @keyframes drawLine {
        0%   { stroke-dashoffset: 800; }
        100% { stroke-dashoffset: 0; }
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <g opacity="0.04">
    <line x1="0" y1="80"  x2="800" y2="80"  stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="0" y1="160" x2="800" y2="160" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="800" y2="240" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="0" y1="320" x2="800" y2="320" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="160" y1="0" x2="160" y2="400" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="320" y1="0" x2="320" y2="400" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="480" y1="0" x2="480" y2="400" stroke="#00f5a0" stroke-width="0.5"/>
    <line x1="640" y1="0" x2="640" y2="400" stroke="#00f5a0" stroke-width="0.5"/>
  </g>

  <!-- Scanline sweep -->
  <rect x="0" y="0" width="800" height="3" fill="url(#nameGrad)" opacity="0.4"
    style="animation: scan 3s linear infinite;"/>

  <!-- Corner decorations -->
  <rect x="12" y="12" width="30" height="30" fill="none" stroke="#00f5a0" stroke-width="1"
    stroke-dasharray="80" stroke-dashoffset="80" opacity="0"
    style="animation: cornerIn 0.8s ease forwards 0.2s;"/>
  <rect x="758" y="12" width="30" height="30" fill="none" stroke="#00f5a0" stroke-width="1"
    stroke-dasharray="80" stroke-dashoffset="80" opacity="0"
    style="animation: cornerIn 0.8s ease forwards 0.4s;"/>
  <rect x="12" y="358" width="30" height="30" fill="none" stroke="#00f5a0" stroke-width="1"
    stroke-dasharray="80" stroke-dashoffset="80" opacity="0"
    style="animation: cornerIn 0.8s ease forwards 0.6s;"/>
  <rect x="758" y="358" width="30" height="30" fill="none" stroke="#00f5a0" stroke-width="1"
    stroke-dasharray="80" stroke-dashoffset="80" opacity="0"
    style="animation: cornerIn 0.8s ease forwards 0.8s;"/>

  <!-- Floating particles -->
  <circle cx="60"  cy="60"  r="2" fill="#00f5a0" opacity="0.5" filter="url(#pglow)" style="animation: float1 4s ease-in-out infinite;"/>
  <circle cx="740" cy="80"  r="1.5" fill="#7b2fff" opacity="0.6" filter="url(#pglow)" style="animation: float2 5s ease-in-out infinite;"/>
  <circle cx="700" cy="300" r="2" fill="#00f5a0" opacity="0.4" filter="url(#pglow)" style="animation: float3 3.5s ease-in-out infinite;"/>
  <circle cx="80"  cy="320" r="1.5" fill="#ff6b35" opacity="0.5" filter="url(#pglow)" style="animation: float4 4.5s ease-in-out infinite;"/>
  <circle cx="400" cy="30"  r="1.5" fill="#00f5a0" opacity="0.3" filter="url(#pglow)" style="animation: float5 6s ease-in-out infinite;"/>
  <circle cx="750" cy="200" r="2" fill="#7b2fff" opacity="0.4" filter="url(#pglow)" style="animation: float6 4s ease-in-out infinite 1s;"/>
  <circle cx="120" cy="200" r="1.5" fill="#00f5a0" opacity="0.35" filter="url(#pglow)" style="animation: float7 5s ease-in-out infinite 0.5s;"/>
  <circle cx="500" cy="370" r="2" fill="#ff6b35" opacity="0.4" filter="url(#pglow)" style="animation: float8 3.8s ease-in-out infinite;"/>

  <!-- LEFT SECTION -->

  <!-- Tag line -->
  <text x="60" y="72" fill="#00f5a0" font-size="10" letter-spacing="4" opacity="0"
    style="animation: fadeIn 0.6s ease forwards 0.3s;">
    // CSE UNDERGRADUATE · BANGLADESH
  </text>

  <!-- Name - RAZIN -->
  <text x="58" y="138" fill="url(#nameGrad)" font-size="58" font-weight="900"
    font-family="'Arial Black', sans-serif" letter-spacing="-1" opacity="0"
    style="animation: fadeInUp 0.7s ease forwards 0.5s;">
    RAZIN
  </text>

  <!-- Name - IBN ASAD -->
  <text x="58" y="186" fill="url(#nameGrad)" font-size="38" font-weight="900"
    font-family="'Arial Black', sans-serif" letter-spacing="1" opacity="0"
    style="animation: fadeInUp 0.7s ease forwards 0.7s;">
    IBN ASAD
  </text>

  <!-- Sub name -->
  <text x="60" y="210" fill="#555570" font-size="11" letter-spacing="3" opacity="0"
    style="animation: fadeIn 0.6s ease forwards 0.9s;">
    MOLLA · رازين · রাজিন
  </text>

  <!-- Typewriter line 1 -->
  <g opacity="0" style="animation: fadeIn 0.4s ease forwards 1.1s;">
    <text x="60" y="240" fill="#888899" font-size="11">$</text>
    <text x="75" y="240" fill="#00f5a0" font-size="11" font-weight="bold">_</text>
    <text x="60" y="240" fill="#00f5a0" font-size="11" xml:space="preserve">
      <tspan x="75">Web Developer &amp; CSE Student</tspan>
    </text>
  </g>

  <!-- Typewriter line 2 -->
  <g opacity="0" style="animation: fadeIn 0.4s ease forwards 1.5s;">
    <text x="60" y="258" fill="#444455" font-size="10" xml:space="preserve">
      <tspan>Next.js · TypeScript · Supabase · GSAP</tspan>
    </text>
  </g>

  <!-- Cursor blink -->
  <rect x="60" y="268" width="8" height="2" fill="#00f5a0" opacity="0"
    style="animation: fadeIn 0.1s ease forwards 1.6s, blink 0.8s ease-in-out infinite 1.6s;"/>

  <!-- Divider line -->
  <line x1="60" y1="288" x2="340" y2="288" stroke="#1e1e2e" stroke-width="1"
    stroke-dasharray="280" stroke-dashoffset="280"
    style="animation: drawLine 0.8s ease forwards 1.8s;"/>

  <!-- Tech badges row 1 -->
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2s;">
    <rect x="60" y="298" width="62" height="18" rx="2" fill="none" stroke="#00f5a0" stroke-width="0.8" opacity="0.7"/>
    <text x="91" y="311" fill="#00f5a0" font-size="8.5" text-anchor="middle" letter-spacing="1">NEXT.JS</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.1s;">
    <rect x="130" y="298" width="72" height="18" rx="2" fill="none" stroke="#00f5a0" stroke-width="0.8" opacity="0.7"/>
    <text x="166" y="311" fill="#00f5a0" font-size="8.5" text-anchor="middle" letter-spacing="1">TYPESCRIPT</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.2s;">
    <rect x="210" y="298" width="52" height="18" rx="2" fill="none" stroke="#00f5a0" stroke-width="0.8" opacity="0.7"/>
    <text x="236" y="311" fill="#00f5a0" font-size="8.5" text-anchor="middle" letter-spacing="1">REACT</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.3s;">
    <rect x="270" y="298" width="64" height="18" rx="2" fill="none" stroke="#7b2fff" stroke-width="0.8" opacity="0.7"/>
    <text x="302" y="311" fill="#7b2fff" font-size="8.5" text-anchor="middle" letter-spacing="1">SUPABASE</text>
  </g>

  <!-- Tech badges row 2 -->
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.4s;">
    <rect x="60" y="322" width="56" height="18" rx="2" fill="none" stroke="#7b2fff" stroke-width="0.8" opacity="0.7"/>
    <text x="88" y="335" fill="#7b2fff" font-size="8.5" text-anchor="middle" letter-spacing="1">THREE.JS</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.5s;">
    <rect x="124" y="322" width="40" height="18" rx="2" fill="none" stroke="#7b2fff" stroke-width="0.8" opacity="0.7"/>
    <text x="144" y="335" fill="#7b2fff" font-size="8.5" text-anchor="middle" letter-spacing="1">GSAP</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.6s;">
    <rect x="172" y="322" width="50" height="18" rx="2" fill="none" stroke="#ff6b35" stroke-width="0.8" opacity="0.7"/>
    <text x="197" y="335" fill="#ff6b35" font-size="8.5" text-anchor="middle" letter-spacing="1">NODE.JS</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.7s;">
    <rect x="230" y="322" width="44" height="18" rx="2" fill="none" stroke="#ff6b35" stroke-width="0.8" opacity="0.7"/>
    <text x="252" y="335" fill="#ff6b35" font-size="8.5" text-anchor="middle" letter-spacing="1">PYTHON</text>
  </g>
  <g opacity="0" style="animation: slideIn 0.5s ease forwards 2.8s;">
    <rect x="282" y="322" width="52" height="18" rx="2" fill="none" stroke="#ff6b35" stroke-width="0.8" opacity="0.7"/>
    <text x="308" y="335" fill="#ff6b35" font-size="8.5" text-anchor="middle" letter-spacing="1">ML / AI</text>
  </g>

  <!-- VERTICAL DIVIDER -->
  <line x1="380" y1="50" x2="380" y2="370" stroke="#1e1e2e" stroke-width="1"
    stroke-dasharray="320" stroke-dashoffset="320"
    style="animation: drawLine 1s ease forwards 1s;"/>

  <!-- RIGHT SECTION -->

  <!-- Section: Featured Projects -->
  <text x="410" y="72" fill="#555570" font-size="9" letter-spacing="4" opacity="0"
    style="animation: fadeIn 0.5s ease forwards 1.2s;">
    ⬡ FEATURED PROJECTS
  </text>

  <!-- Project 1: ObroyLand -->
  <g opacity="0" style="animation: fadeInUp 0.6s ease forwards 1.4s;">
    <rect x="410" y="82" width="360" height="62" rx="3" fill="#16161f" stroke="#2a2a3e" stroke-width="1"/>
    <rect x="410" y="82" width="3" height="62" rx="1" fill="#7b2fff"/>
    <text x="424" y="100" fill="#ffffff" font-size="13" font-weight="bold" font-family="Arial, sans-serif">ObroyLand</text>
    <text x="424" y="116" fill="#555570" font-size="9" letter-spacing="1">REAL ESTATE · FULL STACK · 2025</text>
    <text x="424" y="132" fill="#888899" font-size="9">Next.js · Supabase · Genkit AI · Leaflet</text>
    <text x="750" y="118" fill="#7b2fff" font-size="9" text-anchor="end" letter-spacing="1">obroyland.xyz →</text>
  </g>

  <!-- Project 2: AC Servicing Doha -->
  <g opacity="0" style="animation: fadeInUp 0.6s ease forwards 1.7s;">
    <rect x="410" y="152" width="360" height="62" rx="3" fill="#16161f" stroke="#2a2a3e" stroke-width="1"/>
    <rect x="410" y="152" width="3" height="62" rx="1" fill="#ff6b35"/>
    <text x="424" y="170" fill="#ffffff" font-size="13" font-weight="bold" font-family="Arial, sans-serif">AC Servicing Doha</text>
    <text x="424" y="186" fill="#555570" font-size="9" letter-spacing="1">SERVICE BUSINESS · QATAR · 2026</text>
    <text x="424" y="202" fill="#888899" font-size="9">Next.js · Tailwind · Google Maps · Vercel</text>
    <text x="750" y="186" fill="#ff6b35" font-size="9" text-anchor="end" letter-spacing="1">acservicingdoha.vercel.app →</text>
  </g>

  <!-- Section: Stats -->
  <text x="410" y="244" fill="#555570" font-size="9" letter-spacing="4" opacity="0"
    style="animation: fadeIn 0.5s ease forwards 2s;">
    ⬡ STATS
  </text>

  <!-- Stat 1 -->
  <g opacity="0" style="animation: fadeInUp 0.5s ease forwards 2.1s;">
    <text x="410" y="264" fill="#888899" font-size="9" letter-spacing="1">PROJECTS</text>
    <text x="760" y="264" fill="#00f5a0" font-size="14" font-weight="bold" text-anchor="end">10+</text>
    <rect x="410" y="268" width="350" height="2" rx="1" fill="#1e1e2e"/>
    <rect x="410" y="268" width="280" height="2" rx="1" fill="#00f5a0" opacity="0.6"
      transform-origin="410 269"
      style="animation: barGrow 1s ease forwards 2.3s; transform: scaleX(0);"/>
  </g>

  <!-- Stat 2 -->
  <g opacity="0" style="animation: fadeInUp 0.5s ease forwards 2.3s;">
    <text x="410" y="292" fill="#888899" font-size="9" letter-spacing="1">RESEARCH PAPERS</text>
    <text x="760" y="292" fill="#7b2fff" font-size="14" font-weight="bold" text-anchor="end">2</text>
    <rect x="410" y="296" width="350" height="2" rx="1" fill="#1e1e2e"/>
    <rect x="410" y="296" width="120" height="2" rx="1" fill="#7b2fff" opacity="0.6"
      transform-origin="410 297"
      style="animation: barGrow 1s ease forwards 2.5s; transform: scaleX(0);"/>
  </g>

  <!-- Stat 3 -->
  <g opacity="0" style="animation: fadeInUp 0.5s ease forwards 2.5s;">
    <text x="410" y="320" fill="#888899" font-size="9" letter-spacing="1">TECHNOLOGIES</text>
    <text x="760" y="320" fill="#ff6b35" font-size="14" font-weight="bold" text-anchor="end">9+</text>
    <rect x="410" y="324" width="350" height="2" rx="1" fill="#1e1e2e"/>
    <rect x="410" y="324" width="240" height="2" rx="1" fill="#ff6b35" opacity="0.6"
      transform-origin="410 325"
      style="animation: barGrow 1s ease forwards 2.7s; transform: scaleX(0);"/>
  </g>

  <!-- Bottom links -->
  <g opacity="0" style="animation: fadeIn 0.6s ease forwards 3s;">
    <text x="410" y="358" fill="#333344" font-size="9" letter-spacing="3">GITHUB</text>
    <text x="470" y="358" fill="#333344" font-size="9">·</text>
    <text x="482" y="358" fill="#333344" font-size="9" letter-spacing="3">LINKEDIN</text>
    <text x="554" y="358" fill="#333344" font-size="9">·</text>
    <text x="566" y="358" fill="#333344" font-size="9" letter-spacing="3">PORTFOLIO</text>
    <text x="648" y="358" fill="#333344" font-size="9">·</text>
    <text x="660" y="358" fill="#333344" font-size="9" letter-spacing="3">ORCID</text>
  </g>

  <!-- Bottom border line -->
  <line x1="60" y1="375" x2="740" y2="375" stroke="#1e1e2e" stroke-width="0.5" opacity="0.5"
    stroke-dasharray="680" stroke-dashoffset="680"
    style="animation: drawLine 1.2s ease forwards 0.5s;"/>
</svg>
